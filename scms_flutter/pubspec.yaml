name: scms_flutter
description: Smart Complaint Management System
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.3
  flutter_bloc: ^8.1.5
  go_router: ^13.2.0
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2
  camera: ^0.11.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  image: ^4.1.3
  video_player: ^2.8.6
  video_compress: ^3.1.2
  firebase_core: ^2.30.0
  firebase_messaging: ^14.9.1
  flutter_local_notifications: ^17.1.2
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0
  lottie: ^3.1.0
  flutter_dotenv: ^5.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  permission_handler: ^11.3.1
  shimmer: ^3.0.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  diff_match_patch: ^0.4.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/images/onboarding/
    - assets/animations/
    - assets/icons/

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21
